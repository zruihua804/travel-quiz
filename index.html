// ==================== SCORING ENGINE ====================
function calculateScores(answers) {
  const cityScores = CITIES.map(city => {
    let total = 0;
    Object.values(answers).forEach(answerId => { total += city.scores[answerId] || 0; });
    return { ...city, totalScore: total };
  });
  cityScores.sort((a, b) => b.totalScore - a.totalScore);
  return cityScores.slice(0, 3);
}

function getRecommendationReason(city, answers) {
  const reasons = [];
  const a = answers;
  const R = (cond, text) => { if (cond) reasons.push(text); };
  R(a.landscape==="sea" && city.scores.sea>=3, "你向往海岸，而"+city.name+"拥有中国最美的海岸线之一");
  R(a.landscape==="mountain" && city.scores.mountain>=3, "你喜欢山川，"+city.name+"有令人震撼的山景");
  R(a.landscape==="lake" && city.scores.lake>=2, "你偏爱湖泊，"+city.name+"的水景会让你流连忘返");
  R(a.landscape==="desert" && city.scores.desert>=2, "你向往广阔天地，"+city.name+"有辽阔的自然空间");
  R(a.architecture==="european" && city.scores.european>=2, "你钟爱欧式建筑，"+city.name+"保留了大量精美的西洋建筑");
  R(a.architecture==="ancient" && city.scores.ancient>=2, "你喜欢古城古镇，"+city.name+"有深厚的历史底蕴");

  R(a.architecture==="ethnic" && city.scores.ethnic>=2, "你喜欢民族风情，"+city.name+"有独特的在地文化体验");

  R(a.vibe==="explore" && city.scores.explore>=3, "你喜欢到处探索，"+city.name+"每个角落都有惊喜");
  R(a.vibe==="intense" && city.scores.intense>=2, "你喜欢密集行程，"+city.name+"有足够多的精彩填满每一天");
  R(a.vibe==="wild" && city.scores.wild>=2, "你热爱户外冒险，"+city.name+"是绝佳的户外天堂");
  R(a.food==="spicy" && city.scores.spicy>=3, "你无辣不欢，"+city.name+"的美食会让味蕾起舞");
  R(a.food==="fresh" && city.scores.fresh>=2, "你偏爱清淡鲜美，"+city.name+"的食材新鲜度不会让你失望");
  R(a.food==="diverse" && city.scores.diverse>=3, "你什么都想试，"+city.name+"的美食多样性绝对满足你");
  R(a.food==="cafe" && city.scores.cafe>=2, "你是咖啡甜品控，"+city.name+"有很棒的咖啡文化");
  R(a.crowd==="avoid" && city.scores.avoid>=2, "你不喜欢人挤人，"+city.name+"相对小众宁静");
  R(a.crowd==="offbeat" && city.scores.offbeat>=2, "你追求小众体验，"+city.name+"有很多未被发现的角落");
  R(a.crowd==="love" && city.scores.love>=2, "你喜欢城市活力，"+city.name+"的热闹不会让你失望");
  R(a.aesthetic==="blue" && city.scores.blue>=2, "你喜欢蓝白色调，"+city.name+"正是你心中的画面");
  R(a.aesthetic==="green" && city.scores.green>=2, "你偏爱青绿色调，"+city.name+"的山水让你心旷神怡");
  R(a.aesthetic==="warm" && city.scores.warm>=2, "你喜欢暖黄色调，"+city.name+"有温暖的市井烟火气");
  R(a.aesthetic==="gray" && city.scores.gray>=2, "你偏爱灰白色调，"+city.name+"有你想要的高级感");
  if (reasons.length < 2) {
    reasons.push(city.name+"的整体氛围与你的偏好非常匹配");
    reasons.push("这座城市的独特气质会给你带来意外的惊喜");
  }
  return reasons.slice(0, 3);
}

function QuizScreen({ questions, onComplete }) {
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState({});
  const [animating, setAnimating] = useState(false);
  const [direction, setDirection] = useState("in");
  const q = questions[currentQ];
  const progress = ((currentQ) / questions.length) * 100;

  const handleSelect = (optionId) => {
    if (animating) return;
    const newAnswers = {...answers, [q.id]: optionId};
    setAnswers(newAnswers);
    setAnimating(true);
    setDirection("out");
    setTimeout(() => {
      if (currentQ < questions.length - 1) { setCurrentQ(currentQ+1); setDirection("in"); setTimeout(()=>setAnimating(false),50); }
      else { onComplete(newAnswers); }
    }, 400);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"linear-gradient(180deg,#0f1923,#1a2a3a)",position:"relative"}}>
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:100}}>
        <div style={{height:3,background:"rgba(255,255,255,0.06)",width:"100%"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,#c8a87c,#e8c88c)",width:`${progress}%`,transition:"width 0.6s cubic-bezier(0.16,1,0.3,1)",borderRadius:"0 2px 2px 0"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 24px"}}>
          <span style={{color:"rgba(232,220,200,0.4)",fontSize:13,fontFamily:"'Noto Sans SC',sans-serif"}}>{currentQ+1} / {questions.length}</span>
          {currentQ > 0 && <button onClick={()=>{setCurrentQ(currentQ-1);setDirection("in");}} style={{background:"none",border:"1px solid rgba(232,220,200,0.15)",color:"rgba(232,220,200,0.5)",padding:"6px 16px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif"}}>← 上一题</button>}
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 20px 40px",maxWidth:560,margin:"0 auto",width:"100%",opacity:direction==="out"?0:1,transform:direction==="out"?"translateX(-40px)":"translateX(0)",transition:"all 0.4s cubic-bezier(0.16,1,0.3,1)"}}>
        <p style={{color:"rgba(232,220,200,0.35)",fontSize:13,marginBottom:12,fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:1}}>{q.subtitle}</p>
        <h2 style={{fontFamily:"'Noto Serif SC',serif",fontSize:"clamp(22px,5vw,30px)",fontWeight:600,color:"#e8dcc8",textAlign:"center",marginBottom:40,lineHeight:1.5,letterSpacing:1}}>{q.question}</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,width:"100%"}}>
          {q.options.map((opt,i) => (
            <button key={opt.id} onClick={()=>handleSelect(opt.id)} style={{background:answers[q.id]===opt.id?"rgba(200,168,124,0.15)":"rgba(255,255,255,0.03)",border:answers[q.id]===opt.id?"1px solid rgba(200,168,124,0.4)":"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:"20px 16px",cursor:"pointer",textAlign:"center",transition:"all 0.3s ease",opacity:direction==="out"?0:1,transform:direction==="out"?"scale(0.95)":"scale(1)",transitionDelay:`${i*50}ms`}}
              onMouseEnter={e=>{if(answers[q.id]!==opt.id){e.currentTarget.style.background="rgba(255,255,255,0.06)";e.currentTarget.style.borderColor="rgba(255,255,255,0.15)";e.currentTarget.style.transform="translateY(-2px)";}}}
              onMouseLeave={e=>{if(answers[q.id]!==opt.id){e.currentTarget.style.background="rgba(255,255,255,0.03)";e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";e.currentTarget.style.transform="translateY(0)";}}}
            >
              <div style={{fontSize:32,marginBottom:8}}>{opt.emoji}</div>
              <div style={{fontFamily:"'Noto Sans SC',sans-serif",fontSize:15,fontWeight:500,color:"#e8dcc8",marginBottom:4}}>{opt.label}</div>
              <div style={{fontFamily:"'Noto Sans SC',sans-serif",fontSize:12,color:"rgba(232,220,200,0.4)"}}>{opt.desc}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0f1923,#1a2a3a)"}}>
      <div style={{position:"relative",height:280,overflow:"hidden",background:(CITY_VISUALS[city.id]||{}).gradient||"linear-gradient(135deg,#1a2535,#2a3545)"}}>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:80,opacity:0.15}}>{(CITY_VISUALS[city.id]||{}).emoji||"🏙️"}</span>
        </div>
        <img src={city.image} alt={city.name} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.6)",zIndex:1}} onError={e=>{e.target.style.opacity='0';}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 40%,#0f1923 100%)",zIndex:2}}/>
        <button onClick={onBack} style={{position:"absolute",top:20,left:20,background:"rgba(0,0,0,0.4)",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,0.15)",color:"rgba(232,220,200,0.8)",padding:"8px 20px",borderRadius:20,fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif",zIndex:3}}>← 返回</button>
        <div style={{position:"absolute",bottom:30,left:0,right:0,textAlign:"center",zIndex:3,opacity:show?1:0,transform:show?"translateY(0)":"translateY(20px)",transition:"all 0.8s cubic-bezier(0.16,1,0.3,1)"}}>
          <h1 style={{fontFamily:"'Noto Serif SC',serif",fontSize:"clamp(36px,8vw,52px)",fontWeight:700,color:"#fff",margin:"0 0 4px",letterSpacing:6,textShadow:"0 2px 20px rgba(0,0,0,0.5)"}}>{city.name}</h1>
          <p style={{fontFamily:"'Noto Sans SC',sans-serif",fontSize:16,color:"rgba(255,255,255,0.7)",letterSpacing:2}}>{city.tagline}</p>
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:8,padding:"16px 20px 0",opacity:show?1:0,transition:"opacity 0.6s ease",transitionDelay:"200ms"}}>
        {city.tags.map(tag=>(
          <span key={tag} style={{background:"rgba(200,168,124,0.1)",color:"rgba(232,220,200,0.6)",padding:"4px 14px",borderRadius:14,fontSize:13,fontFamily:"'Noto Sans SC',sans-serif"}}>{tag}</span>
        ))}
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"0 20px 40px",opacity:show?1:0,transform:show?"translateY(0)":"translateY(20px)",transition:"all 0.8s ease",transitionDelay:"300ms"}}>
        <p style={{fontFamily:"'Noto Serif SC',serif",fontSize:16,color:"rgba(232,220,200,0.7)",lineHeight:2,textAlign:"justify",padding:"24px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>{city.brief}</p>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"0 20px 60px",opacity:show?1:0,transition:"opacity 0.8s ease",transitionDelay:"500ms"}}>
        <h2 style={{fontFamily:"'Noto Serif SC',serif",fontSize:22,color:"#e8dcc8",marginBottom:24,letterSpacing:2,textAlign:"center"}}>✦ 5天行程推荐 ✦</h2>
        {city.itinerary.map((day,di)=>(
          <div key={di} style={{marginBottom:12,opacity:show?1:0,transform:show?"translateY(0)":"translateY(20px)",transition:"all 0.6s ease",transitionDelay:`${600+di*100}ms`}}>
            <div onClick={()=>setExpandedDay(expandedDay===di?-1:di)} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",cursor:"pointer",background:expandedDay===di?"rgba(200,168,124,0.08)":"rgba(255,255,255,0.02)",border:expandedDay===di?"1px solid rgba(200,168,124,0.2)":"1px solid rgba(255,255,255,0.04)",borderRadius:expandedDay===di?"16px 16px 0 0":16,transition:"all 0.3s ease"}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:expandedDay===di?"rgba(200,168,124,0.2)":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:expandedDay===di?"#c8a87c":"rgba(232,220,200,0.5)",fontFamily:"'Noto Sans SC',sans-serif",flexShrink:0,transition:"all 0.3s ease"}}>D{day.day}</div>
              <div style={{flex:1}}><span style={{fontFamily:"'Noto Sans SC',sans-serif",fontSize:15,fontWeight:500,color:"#e8dcc8"}}>{day.title}</span></div>
              <span style={{color:"rgba(232,220,200,0.3)",fontSize:18,transform:expandedDay===di?"rotate(180deg)":"rotate(0)",transition:"transform 0.3s ease"}}>▾</span>
            </div>
            {expandedDay===di && (
              <div style={{background:"rgba(200,168,124,0.04)",border:"1px solid rgba(200,168,124,0.2)",borderTop:"none",borderRadius:"0 0 16px 16px",padding:"12px 18px 18px"}}>
                {day.activities.map((act,ai)=>(
                  <div key={ai} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:ai<day.activities.length-1?"1px solid rgba(255,255,255,0.03)":"none"}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:"rgba(200,168,124,0.4)",marginTop:7,flexShrink:0}}/>
                    <p style={{fontFamily:"'Noto Sans SC',sans-serif",fontSize:14,color:"rgba(232,220,200,0.6)",lineHeight:1.7,margin:0}}>{act}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
      <div style={{textAlign:"center",padding:"0 20px 60px",opacity:show?1:0,transition:"opacity 1s ease",transitionDelay:"1s"}}>
        <button onClick={onBack} style={{background:"linear-gradient(135deg,#c8a87c,#a08060)",border:"none",color:"#1a1a1a",padding:"14px 40px",borderRadius:30,fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:1,boxShadow:"0 4px 20px rgba(200,168,124,0.3)"}}>← 返回推荐结果</button>
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
function App() {
  const [screen, setScreen] = useState("welcome");
  const [answers, setAnswers] = useState({});
  const [results, setResults] = useState([]);
  const [selectedCity, setSelectedCity] = useState(null);
  const [locked, setLocked] = useState(true);
  const [showUnlock, setShowUnlock] = useState(false);

  const handleQuizComplete = (ans) => {
    setAnswers(ans);
    setResults(calculateScores(ans));
    setScreen("results");
  };

  return (
    <div style={{fontFamily:"'Noto Sans SC','PingFang SC',sans-serif"}}>
      {screen==="welcome" && <WelcomeScreen onStart={()=>setScreen("quiz")} />}
      {screen==="quiz" && <QuizScreen questions={QUESTIONS} onComplete={handleQuizComplete} />}
      {screen==="results" && (
        <ResultsScreen results={results} answers={answers}
          onViewCity={(city)=>{setSelectedCity(city);setScreen("cityDetail");}}
          onRestart={()=>{setAnswers({});setResults([]);setLocked(true);setScreen("welcome");}}
          locked={locked}
          onPaywall={()=>setShowUnlock(true)}
        />
      )}
      {screen==="cityDetail" && <CityDetailScreen city={selectedCity} onBack={()=>setScreen("results")} />}
      {showUnlock && (
        <UnlockModal
          results={results}
          onUnlock={()=>{setLocked(false);setShowUnlock(false);}}
          onClose={()=>setShowUnlock(false)}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
